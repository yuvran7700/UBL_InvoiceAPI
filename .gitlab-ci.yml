# Official Python image to run the pipeline jobs
image: python:latest

# Set the pip cache directory
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# Caching pip dependencies
cache:
  paths:
    - .cache/pip
    - .venv/

# Install dependencies and create virtual environment
before_script:
  - python --version ; pip --version  # For debugging
  - python -m venv .venv  # Create a virtual environment
  - source .venv/bin/activate  # Activate the virtual environmen
  - pip install --upgrade pip
  - pip install -r requirements.txt  # Install all dependencies in the requirements file
  - pip install httpx

stages:
  - lint
  - tests
  - coverage

lint:
  stage: lint
  script:
    - pip install pylint
    - pylint tests/
    - pylint src/
  allow_failure: true

unit_tests:
  stage: tests
  rules:
    - exists:
        - tests/unit/**  # Checks if there are any files in tests/unit folder
  script:
    - pip install pytest
    - pytest tests/unit/
  allow_failure: false

integration_tests:
  stage: tests
  script:
    - pip install pytest
    - pytest tests/integration/
  allow_failure: true

coverage:
  stage: coverage
  script: 
    - pip install coverage
    - coverage run -m pytest
    - coverage report
    - coverage html
  artifacts:
    paths:
      - htmlcov/
  allow_failure: false
